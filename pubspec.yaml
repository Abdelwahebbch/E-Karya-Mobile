name: e_karya
description: A mobile application for finding, renting, and managing residential properties.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  appwrite: 17.0.0
  provider: ^6.0.0
  http: ^1.1.0
  intl: ^0.19.0
  cached_network_image: ^3.3.0
  smooth_page_indicator: ^1.1.0
  flutter_rating_bar: ^4.0.1
  image_picker: ^1.0.4
  firebase_core: ^2.24.0
  firebase_auth: ^4.14.0
  firebase_storage: ^11.5.0
  cloud_firestore: ^4.14.0
  flutter_stripe: ^12.2.0
  google_maps_flutter: ^2.5.0
  geolocator: ^9.0.2
  uuid: ^4.0.0
  shared_preferences: ^2.2.2
  flutter_dotenv: ^5.1.0
  dio: ^5.3.1
  freezed_annotation: ^3.1.0
  json_serializable: ^6.7.1
  equatable: ^2.0.5
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  build_runner: ^2.4.6
  freezed: ^3.2.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - .env
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
